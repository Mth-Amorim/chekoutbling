services:
  web:
    image: oven/bun:latest
    container_name: box-check-joy-app
    working_dir: /app
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port ${APP_PORT:-8080}"
    ports:
      - "59222:${APP_PORT:-8080}"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100

  dns-proxy:
    build:
      context: .
      dockerfile: docker/dns-proxy/Dockerfile
    container_name: box-check-joy-dns-proxy
    depends_on:
      - web
    environment:
      - INTERNAL_DNS_DOMAIN=${INTERNAL_DNS_DOMAIN:-uzenails.local}
      - INTERNAL_APP_IP=${INTERNAL_APP_IP:-192.168.3.60}
      - UPSTREAM_DNS=${UPSTREAM_DNS:-1.1.1.1}
      - PROXY_SERVER_NAME=${PROXY_SERVER_NAME:-uzenails.local}
      - PROXY_UPSTREAM_HOST=${PROXY_UPSTREAM_HOST:-web}
      - PROXY_UPSTREAM_PORT=${PROXY_UPSTREAM_PORT:-${APP_PORT:-8080}}
    ports:
      - "80:80"
      - "53:53/udp"
      - "53:53/tcp"
    restart: unless-stopped
