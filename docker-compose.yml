services:
  web:
    image: oven/bun:latest
    container_name: box-check-joy-app
    working_dir: /app
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port ${APP_PORT:-80}"
    ports:
      - "52222:${APP_PORT:-8080}"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    extra_hosts:
      - "uzenails.local:127.0.0.1"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
