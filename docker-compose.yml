services:
  web:
    image: oven/bun:latest
    container_name: box-check-joy-app
    working_dir: /app
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
