server {
    listen 80;
    server_name localhost;

    # Adiciona um resolver para evitar que o Nginx pare se o DNS da API não estiver pronto
    resolver 1.1.1.1 8.8.8.8 valid=30s;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API do Bling via Traefik
    location /api/ {
        # Usar variável no proxy_pass impede que o Nginx crash no boot se o host não resolver
        set $api_upstream http://uzeapi-blingapiv1-ruqtco-15fbdb-187-77-35-239.traefik.me/api/;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host uzeapi-blingapiv1-ruqtco-15fbdb-187-77-35-239.traefik.me;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
